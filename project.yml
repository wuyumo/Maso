name: Maso
options:
  bundleIdPrefix: com.yumowu
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  developmentLanguage: en
  xcodeVersion: "26.0"

packages:
  Lottie:
    url: https://github.com/airbnb/lottie-spm
    exactVersion: "4.5.2"
  # 2026-05 anatomy 重做 — MuscleMap SwiftUI SDK 提供 36 个肌群 (含 14 个 sub-muscle)
  # 解剖学正确的 bezier polygon. 替换原 react-body-highlighter 数据 (后者只有 17 个 major).
  # 接入方式: BodyHint.swift 包裹 MuscleMap.BodyView, MuscleMapping.swift 做 enum 映射.
  # License: MIT. 详见 docs/exercise-db-overhaul-plan.md §0.6 + _anatomy-research.md
  MuscleMap:
    url: https://github.com/melihcolpan/MuscleMap
    from: "1.6.4"

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only (上架决定); watch target 自己覆写成 4
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal
    # 上架签名: Eric Ng 付费 Developer Program (Apple ID wuyumoawuyumo@outlook.com).
    # 旧免费 team UR6F66266C 只能装机不能上架, 已迁走 — 不要改回去.
    DEVELOPMENT_TEAM: TW8ZVVX529
    CODE_SIGN_STYLE: Automatic

# StoreKit 2 local 测试 — Run 时用 Maso.storekit config 替代真 App Store.
# Archive / Release 不受影响 (那时走真 App Store), 所以 ship 时这个 scheme 改动是安全的.
schemes:
  Maso:
    build:
      targets:
        Maso: all
    run:
      config: Debug
      storeKitConfiguration: Maso.storekit

# ⚠️ Info.plist 全部手维护 (Maso/Info.plist, MasoWidgets/Info.plist, MasoWatch/Info.plist):
# 上架前的合规改动 (Masso 文案 / 权限描述 / 加密豁免 / 版本号) 直接改 plist 文件,
# 这里不写 info: 块 — 否则 xcodegen generate 会把 plist 重新生成, 抹掉手改内容.

targets:
  Maso:
    type: application
    platform: iOS
    dependencies:
      - package: Lottie
      - package: MuscleMap
      # Widget extension — 内嵌进 .ipa, 锁屏 / Dynamic Island Live Activity 走它
      - target: MasoWidgets
      # watchOS companion — 训练状态镜像到手表 (心率 / 完成组 / 休息倒计时)
      - target: MasoWatch
    # Secrets.xcconfig 把 DeepSeek API key 等敏感信息注入 build setting,
    # 再通过 Info.plist 暴露给 app. 文件不入 git, 改 key 不会污染 commit.
    configFiles:
      Debug: Maso/Secrets.xcconfig
      Release: Maso/Secrets.xcconfig
    sources:
      - path: Maso
        excludes:
          - "**/.DS_Store"
          - "Secrets.xcconfig"
          - "Secrets.xcconfig.example"
      # 手机⇄手表共享的同步协议 (WatchSyncState / WatchAction)
      - path: MasoWatch/Shared
    entitlements:
      path: Maso/Maso.entitlements
      properties:
        # HealthKit — 让 Maso 把训练数据写到 Apple Fitness / Health
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yumowu.maso
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Maso/Info.plist
        # iPhone only — 显式锁死, 否则 xcodegen target 级派生 "1,2" 会让 iPad 跑未测试布局.
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  # Live Activity widget extension — 锁屏 + Dynamic Island 训练状态展示
  MasoWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: MasoWidgets
      # 跟 main app 共享 ActivityAttributes schema
      - path: Maso/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yumowu.maso.widgets
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MasoWidgets/Info.plist
        SKIP_INSTALL: YES
        # iPhone only — xcodegen 在 target 级会自动派生成 "1,2" 覆盖 project base 的 "1",
        # 必须在 target 显式锁死, 否则 iPad 跑未测试布局 → 上架审核风险.
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Masso Widgets

  # watchOS companion app — 训练镜像: 当前动作 / 组数 / 休息倒计时 / 完成组按钮;
  # 训练期间跑 HKWorkoutSession (实时心率 + 卡路里 + 圆环积分).
  # 手机是 source of truth (TrainingSessionStore), 手表只渲染状态 + 回传动作.
  MasoWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      # Shared 单独引 (跟 Maso target 用同一路径串引它) — 否则 Shared 同时挂在 "MasoWatch"
      # 组和根组下, xcodegen 报 "member of multiple groups" warning.
      - path: MasoWatch
        excludes:
          - Shared
      - path: MasoWatch/Shared
    entitlements:
      path: MasoWatch/MasoWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yumowu.maso.watchkitapp
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MasoWatch/Info.plist
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
